<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <!-- Tailwind CSS -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body class="bg-slate-50 text-slate-800 antialiased">

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ── MOCK DATA — El Salvador (inspirado en socios ADES) ── */
    const PRODUCTS = [
      { id:1, name:'Arroz de Primera 25 lbs', sku:'ARR-001', cat:'Granos', price:12.50, retail:17.00, stock:1200, minOrder:10, unit:'bolsa', dist:'Diana Distribuciones S.A.', distId:'d1', emoji:'🌾', featured:true, disc:26, rating:4.8, reviews:142 },

      { id:3, name:'Frijoles Rojos de Seda 1 lb', sku:'FRJ-003', cat:'Granos', price:1.45, retail:2.20, stock:2000, minOrder:48, unit:'bolsa', dist:'Interamérica Alimentos S.A.', distId:'d2', emoji:'🫘', featured:true, disc:34, rating:4.9, reviews:215 },

      { id:6, name:'Sal Yodada 1 lb', sku:'SAL-006', cat:'Condimentos', price:0.45, retail:0.75, stock:5000, minOrder:96, unit:'bolsa', dist:'Distribuidora APS S.A.', distId:'d3', emoji:'🧂', featured:false, disc:40, rating:4.4, reviews:203 },
      { id:7, name:'Leche Entera Pasteurizada 1L', sku:'LEC-007', cat:'Lácteos', price:1.10, retail:1.55, stock:3000, minOrder:24, unit:'litro', dist:'Diana Distribuciones S.A.', distId:'d1', emoji:'🥛', featured:true, disc:29, rating:4.7, reviews:176 },
      { id:8, name:'Crema Ácida Tres Estrellas 500ml', sku:'CRE-008', cat:'Lácteos', price:1.80, retail:2.60, stock:1500, minOrder:12, unit:'bolsa', dist:'Interamérica Alimentos S.A.', distId:'d2', emoji:'🍦', featured:false, disc:31, rating:4.6, reviews:94 },
      { id:9, name:'Galletas Soda Diana 600g', sku:'GAL-009', cat:'Snacks', price:1.95, retail:2.80, stock:900, minOrder:24, unit:'paquete', dist:'Diana Distribuciones S.A.', distId:'d1', emoji:'🍪', featured:true, disc:30, rating:4.8, reviews:312 },
      { id:10, name:'Mortadela de Pollo 1kg', sku:'MOR-010', cat:'Embutidos', price:4.20, retail:6.00, stock:400, minOrder:12, unit:'unidad', dist:'Distribuidora APS S.A.', distId:'d3', emoji:'🥩', featured:false, disc:30, rating:4.5, reviews:78 },
      { id:11, name:'Detergente en Polvo 5kg', sku:'DET-011', cat:'Limpieza', price:8.50, retail:12.00, stock:700, minOrder:6, unit:'bolsa', dist:'Interamérica Alimentos S.A.', distId:'d2', emoji:'🧺', featured:false, disc:29, rating:4.7, reviews:134 },
      { id:12, name:'Café Grano de Oro Molido 250g', sku:'CAF-012', cat:'Bebidas', price:3.20, retail:4.75, stock:250, minOrder:12, unit:'bolsa', dist:'Distribuidora APS S.A.', distId:'d3', emoji:'☕', featured:true, disc:33, rating:4.9, reviews:256 },
    ];

    const ORDERS = [
      { id:'ORD-001', buyer:'Tienda El Progreso', date:'2024-04-15', status:'entregado', total:312.50, comm:7.81 },
      { id:'ORD-002', buyer:'Supermercado La Colonia', date:'2024-04-18', status:'en_camino', total:189.20, comm:4.73 },
      { id:'ORD-003', buyer:'Pupusería Doña Carmen', date:'2024-04-20', status:'pendiente', total:145.80, comm:3.65 },
      { id:'ORD-004', buyer:'Abarrotes San Jacinto', date:'2024-04-22', status:'confirmado', total:278.40, comm:6.96 },
      { id:'ORD-005', buyer:'Comedor La Choza', date:'2024-04-24', status:'pendiente', total:210.60, comm:5.27 },
    ];

    const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun'];
    const SALES  = [4820,5210,6180,5840,7230,6890];
    const ORDERS_CNT = [32,38,45,41,54,49];
    const SAVINGS_DATA = [420,510,680,540,720,610];

    /* ── HELPERS ── */
    const $$ = (n) => '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const pct = (n) => n.toFixed(1)+'%';

    const STATUS = {
      pendiente:  { label:'Pendiente',  cls:'bg-amber-100 text-amber-700' },
      confirmado: { label:'Confirmado', cls:'bg-sky-100 text-sky-700' },
      en_camino:  { label:'En camino',  cls:'bg-violet-100 text-violet-700' },
      entregado:  { label:'Entregado',  cls:'bg-emerald-100 text-emerald-700' },
      cancelado:  { label:'Cancelado',  cls:'bg-red-100 text-red-600' },
    };

    /* ── UI ATOMS ── */
    const Btn = ({ children, v='primary', sz='md', onClick, disabled, full, cls }) => {
      const base = 'inline-flex items-center justify-center font-semibold rounded-xl transition-all duration-150 border-0 outline-none select-none';
      const sizes = { sm:'px-3 py-1.5 text-xs gap-1', md:'px-4 py-2.5 text-sm gap-2', lg:'px-6 py-3 text-base gap-2' };
      const vars = {
        primary:'bg-sky-500 hover:bg-sky-600 text-white shadow-sm active:scale-95',
        green:'bg-emerald-500 hover:bg-emerald-600 text-white shadow-sm active:scale-95',
        amber:'bg-amber-500 hover:bg-amber-600 text-white shadow-sm active:scale-95',
        purple:'bg-violet-500 hover:bg-violet-600 text-white shadow-sm active:scale-95',
        red:'bg-red-500 hover:bg-red-600 text-white shadow-sm active:scale-95',
        outline:'border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 active:scale-95',
        ghost:'bg-transparent text-slate-500 hover:bg-slate-100 active:scale-95',
      };
      return (
        <button onClick={onClick} disabled={disabled}
          className={`${base} ${sizes[sz]} ${vars[v]} ${full?'w-full':''} ${disabled?'opacity-40 cursor-not-allowed':''} ${cls||''}`}>
          {children}
        </button>
      );
    };

    const Badge = ({ label, cls }) => (
      <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${cls}`}>{label}</span>
    );

    const Card = ({ children, className, onClick }) => (
      <div onClick={onClick}
        className={`bg-white rounded-2xl border border-slate-200 shadow-sm ${onClick?'cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition-all duration-200':''} ${className||''}`}>
        {children}
      </div>
    );

    const KPI = ({ icon, label, value, sub, color }) => {
      const colors = {
        blue:'bg-sky-50 text-sky-600', green:'bg-emerald-50 text-emerald-600',
        amber:'bg-amber-50 text-amber-600', purple:'bg-violet-50 text-violet-600', red:'bg-red-50 text-red-600',
      };
      return (
        <Card className="p-5">
          <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-2xl mb-3 ${colors[color||'blue']}`}>{icon}</div>
          <div className="text-2xl font-bold text-slate-800">{value}</div>
          <div className="text-sm text-slate-500 mt-0.5">{label}</div>
          {sub && <div className="text-xs text-slate-400 mt-1">{sub}</div>}
        </Card>
      );
    };

    const Modal = ({ open, onClose, title, children }) => {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto fade-in" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
              <h2 className="text-lg font-bold text-slate-800">{title}</h2>
              <button onClick={onClose} className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-100 text-xl leading-none">&times;</button>
            </div>
            <div className="p-6">{children}</div>
          </div>
        </div>
      );
    };

    const Field = ({ label, type='text', placeholder, value, onChange, icon }) => (
      <div>
        {label && <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>}
        <div className="relative">
          {icon && <span className="absolute left-3 top-1/2 -translate-y-1/2 text-base">{icon}</span>}
          <input type={type} placeholder={placeholder} value={value||''} onChange={e=>onChange&&onChange(e.target.value)}
            className={`w-full border border-slate-200 rounded-xl py-2.5 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent transition ${icon?'pl-9 pr-3':'px-3'}`} />
        </div>
      </div>
    );

    const Sel = ({ label, value, onChange, opts }) => (
      <div>
        {label && <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>}
        <select value={value} onChange={e=>onChange(e.target.value)}
          className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400 transition">
          {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      </div>
    );

    /* ── CHART COMPONENTS (Chart.js) ── */
    // La altura DEBE estar en el div contenedor con position:relative,
    // NO en el canvas — Chart.js sobreescribe los atributos del canvas.
    const useChart = (type, data, options) => {
      const canvasRef = useRef();
      const instanceRef = useRef();
      useEffect(() => {
        if (!canvasRef.current) return;
        // destruir instancia anterior si existe
        if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; }
        instanceRef.current = new Chart(canvasRef.current, { type, data, options });
        return () => { if (instanceRef.current) { instanceRef.current.destroy(); instanceRef.current = null; } };
      }, []); // solo al montar
      return canvasRef;
    };

    const BarChart = ({ labels, datasets, height=200 }) => {
      const ref = useChart('bar',
        { labels, datasets: datasets.map(d=>({ ...d, borderRadius:4, borderSkipped:false })) },
        {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ labels:{ boxWidth:12, font:{size:11}, color:'#64748b' } } },
          scales:{
            x:{ grid:{display:false}, ticks:{color:'#94a3b8',font:{size:11}} },
            y:{ grid:{color:'#f1f5f9'}, border:{display:false}, ticks:{color:'#94a3b8',font:{size:11}, callback:v=>`$${(v/1000).toFixed(0)}k`} },
          }
        }
      );
      // El div padre con height explícito es lo que Chart.js usa para dimensionarse
      return <div style={{ position:'relative', width:'100%', height:`${height}px` }}><canvas ref={ref} /></div>;
    };

    const LineChart = ({ labels, datasets, height=200 }) => {
      const ref = useChart('line',
        { labels, datasets: datasets.map(d=>({ ...d, tension:0.4, pointRadius:4, fill:true })) },
        {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ labels:{ boxWidth:12, font:{size:11}, color:'#64748b' } } },
          scales:{
            x:{ grid:{display:false}, ticks:{color:'#94a3b8',font:{size:11}} },
            y:{ grid:{color:'#f1f5f9'}, border:{display:false}, ticks:{color:'#94a3b8',font:{size:11}, callback:v=>`$${(v/1000).toFixed(0)}k`} },
          }
        }
      );
      return <div style={{ position:'relative', width:'100%', height:`${height}px` }}><canvas ref={ref} /></div>;
    };

    const DonutChart = ({ data, labels, colors, height=200 }) => {
      const ref = useChart('doughnut',
        { labels, datasets:[{ data, backgroundColor:colors, borderWidth:2, borderColor:'#fff' }] },
        {
          responsive:true, maintainAspectRatio:false, cutout:'65%',
          plugins:{ legend:{ position:'right', labels:{ boxWidth:12, font:{size:11}, color:'#64748b' } } }
        }
      );
      return <div style={{ position:'relative', width:'100%', height:`${height}px` }}><canvas ref={ref} /></div>;
    };

    /* ── STATUS BADGE ── */
    const SBadge = ({ s }) => {
      const info = STATUS[s] || { label:s, cls:'bg-slate-100 text-slate-600' };
      return <Badge label={info.label} cls={info.cls} />;
    };

    /* ── AVATAR ── */
    const Av = ({ name, size=36 }) => {
      const bg = ['bg-sky-500','bg-emerald-500','bg-violet-500','bg-amber-500','bg-rose-500'];
      const i = name.charCodeAt(0) % bg.length;
      const init = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
      return (
        <div className={`${bg[i]} text-white rounded-full flex items-center justify-center font-bold flex-shrink-0`}
          style={{ width:size, height:size, fontSize:size*0.38 }}>{init}</div>
      );
    };

    /* ═══════════════════════════════════════════
       LANDING PAGE
    ═══════════════════════════════════════════ */
    const Landing = ({ go }) => {
      const [modal, setModal] = useState(null);

          {/* NAV */}
          <nav className="max-w-7xl mx-auto flex items-center justify-between px-8 py-5">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 rounded-xl bg-sky-500 flex items-center justify-center text-xl">🏪</div>
              <span className="text-white font-bold text-xl">MarketHub <span className="text-sky-400">Pro</span></span>
            </div>
            <div className="flex items-center gap-3">
              <Btn v="ghost" sz="md" onClick={() => go('buyer')} cls="!text-slate-300 hover:!text-white">Iniciar sesión</Btn>
              <Btn v="primary" sz="md" onClick={() => setModal('reg')}>Registrarse gratis</Btn>
            </div>
          </nav>

          {/* HERO */}
          <div className="max-w-7xl mx-auto px-8 py-16 text-center">
            <div className="inline-flex items-center gap-2 text-sky-300 text-xs font-semibold px-4 py-2 rounded-full mb-6 border border-sky-700/50 bg-sky-900/40">
              ✨ Plataforma #1 B2B de abarrotes y alimentos en El Salvador
            </div>
            <h1 className="text-5xl font-extrabold text-white leading-tight mb-5 max-w-3xl mx-auto">
              Conecta distribuidores con{' '}
              <span className="text-transparent bg-clip-text" style={{backgroundImage:'linear-gradient(90deg,#38bdf8,#34d399)'}}>
                minoristas y mayoristas
              </span>
            </h1>
            <p className="text-slate-300 text-lg mb-10 max-w-xl mx-auto leading-relaxed">
              Publica tu catálogo, gestiona inventario y ofrece precios especiales. Los compradores ahorran hasta un{' '}
              <strong className="text-emerald-400">40%</strong> vs precio de mercado.
            </p>
            <div className="flex items-center justify-center gap-4 flex-wrap">
              <Btn v="primary" sz="lg" onClick={() => setModal('dist')}>Soy Distribuidor → Vender</Btn>
              <Btn sz="lg" onClick={() => go('buyer')}
                cls="!bg-white/10 !text-white border border-white/20 hover:!bg-white/20 rounded-xl px-6 py-3 text-base font-semibold transition">
                Soy Comprador → Ver ofertas
              </Btn>
            </div>

            {/* STATS */}
            <div className="grid grid-cols-3 gap-8 mt-20 max-w-xl mx-auto">
              {[['🏪','85+','Distribuidores activos'],['🛒','1,200+','Compradores registrados'],['💰','35%','Ahorro promedio']].map(([icon,val,lab])=>(
                <div key={lab}>
                  <div className="text-3xl mb-2">{icon}</div>
                  <div className="text-3xl font-extrabold text-white">{val}</div>
                  <div className="text-slate-400 text-sm mt-1">{lab}</div>
                </div>
              ))}
            </div>
          </div>

          {/* FEATURES */}
          <div className="max-w-7xl mx-auto px-8 pb-12">
            <div className="grid grid-cols-3 gap-5">
              {[
                {icon:'📦',title:'Catálogo inteligente',desc:'Publica productos con precios diferenciados para minoristas y mayoristas. Stock en tiempo real.'},
                {icon:'💰',title:'Ahorros tangibles',desc:'Cada comprador ve exactamente cuánto ahorra vs precio de mercado. Transparencia que genera confianza.'},
                {icon:'📊',title:'Analytics poderoso',desc:'Ventas, pedidos, comisiones y tendencias desde un dashboard visual e intuitivo.'},
              ].map(f=>(
                <div key={f.title} className="rounded-2xl p-6 bg-white/5 border border-white/10">
                  <div className="text-4xl mb-4">{f.icon}</div>
                  <h3 className="text-white font-bold text-lg mb-2">{f.title}</h3>
                  <p className="text-slate-400 text-sm leading-relaxed">{f.desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* PRICING */}
          <div className="max-w-7xl mx-auto px-8 pb-16 text-center">
            <h2 className="text-3xl font-bold text-white mb-2">Planes para distribuidores</h2>
            <p className="text-slate-400 mb-10">Empieza gratis. Escala cuando quieras.</p>
            <div className="grid grid-cols-3 gap-5 max-w-4xl mx-auto">
              {[
                {name:'Básico',price:0,features:['10 productos','Pedidos ilimitados','Soporte por email','Analytics básico'],popular:false},
                {name:'Pro',price:299,features:['Productos ilimitados','Analytics avanzado','Promociones y destacados','Soporte 24/7'],popular:true},
                {name:'Enterprise',price:799,features:['Todo en Pro','Gerente dedicado','Integración ERP','Comisión al 1.5%'],popular:false},
              ].map(p=>(
                <div key={p.name} className={`rounded-2xl p-6 text-left relative ${p.popular?'ring-2 ring-sky-400 bg-sky-500/15':'bg-white/5'} border border-white/10`}>
                  {p.popular && <div className="absolute -top-3 left-6 bg-sky-400 text-sky-900 text-xs font-bold px-3 py-1 rounded-full">MÁS POPULAR</div>}
                  <div className="text-white font-bold text-lg mb-1">{p.name}</div>
                  <div className="mb-4"><span className="text-3xl font-extrabold text-white">{p.price===0?'Free':$$( p.price)}</span>{p.price>0&&<span className="text-slate-400 text-sm">/mo</span>}</div>
                  <ul className="space-y-2 mb-6">
                    {p.features.map(f=><li key={f} className="text-slate-300 text-sm flex items-start gap-2"><span className="text-emerald-400">✓</span>{f}</li>)}
                  </ul>
                  <Btn v={p.popular?'primary':'outline'} full onClick={()=>setModal('dist')}
                    cls={!p.popular?'!bg-white/10 !text-white !border-white/20 hover:!bg-white/20':''}>
                    Empezar {p.name}
                  </Btn>
                </div>
              ))}
            </div>
            <p className="text-slate-500 text-sm mt-6">+ 2.5% de comisión por cada venta en la plataforma</p>
          </div>

          <div className="text-center py-8 text-slate-600 text-sm border-t border-white/5">
            © 2024 MarketHub Pro · Hecho en El Salvador 🇸🇻
          </div>

          {/* MODALS */}
          <Modal open={modal==='reg'} onClose={()=>setModal(null)} title="¿Cómo quieres usar MarketHub?">
            <div className="grid grid-cols-2 gap-4">
              {[{r:'dist',icon:'🏭',t:'Soy Distribuidor',d:'Quiero publicar y vender mis productos a minoristas y mayoristas.'},
                {r:'buyer',icon:'🛒',t:'Soy Comprador',d:'Quiero encontrar productos a precios especiales para mi negocio.'}].map(x=>(
                <button key={x.r} onClick={()=>{setModal(null);go(x.r==='dist'?'distributor':'buyer');}}
                  className="p-5 rounded-2xl border-2 border-slate-200 hover:border-sky-400 hover:bg-sky-50 transition-all text-left group">
                  <div className="text-4xl mb-3">{x.icon}</div>
                  <div className="font-bold text-slate-800 group-hover:text-sky-700 mb-1">{x.t}</div>
                  <div className="text-sm text-slate-500">{x.d}</div>
                </button>
              ))}
            </div>
          </Modal>

          <Modal open={modal==='dist'} onClose={()=>setModal(null)} title="Crear cuenta de Distribuidor">
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-3">
                <Field label="Nombre" placeholder="Juan" />
                <Field label="Apellido" placeholder="García" />
              </div>
              <Field label="Email empresarial" icon="✉️" placeholder="ventas@empresa.com" />
              <Field label="Empresa" icon="🏭" placeholder="Distribuidora SA de CV" />
              <Field label="Contraseña" type="password" icon="🔒" placeholder="••••••••" />
              <div className="flex items-center gap-3 p-3 bg-emerald-50 rounded-xl border border-emerald-200">

            <select value={filterActive} onChange={e=>setFilterActive(e.target.value)}

                {promos.length === 0 ? 'Crea tu primera oferta para atraer más compradores.' : 'Prueba cambiando los filtros.'}

            </Card>
          )}

          <div className="space-y-4">
            {filtered.map(p=>(
              <PromoCard key={p.id} p={p} products={products}
                onToggle={handleToggle} onEdit={openEdit} onDelete={handleDelete} />
            ))}
          </div>

          {/* Modal crear / editar */}
          <Modal open={showModal} onClose={()=>setShowModal(false)}
            title={editing ? '✏️ Editar promoción' : '🏷️ Nueva promoción'}>
            {error && (
              <div className="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm">{error}</div>

        { id:'m5', sender_id:'d1', sender_name:'Diana Distribuciones S.A.', sender_role:'distributor', body:'¡Buenos días! Tenemos stock disponible. El tiempo de entrega es de 2 a 4 horas dentro de San Salvador.', created_at:'2024-04-23T14:30:00' },

    const ChatPage = ({ role }) => {
      const API = window.location.origin;
      const [convs, setConvs]       = useState([]);
      const [active, setActive]     = useState(null);
      const [msgs, setMsgs]         = useState([]);
      const [input, setInput]       = useState('');
      const [loading, setLoading]   = useState(true);
      const [sending, setSending]   = useState(false);
      const messagesEnd             = useRef(null);
      const pollRef                 = useRef(null);

      // Cargar conversaciones
      const loadConvs = async () => {
        try {
          const token = localStorage.getItem('mhToken');
          const r = await fetch(`${API}/api/chat/conversations`, { headers: { Authorization:`Bearer ${token}` } });
          if (!r.ok) throw new Error();
          const d = await r.json();
          setConvs(d.conversations);
        } catch {
          setConvs(MOCK_CONVS);
        } finally { setLoading(false); }
      };

      // Cargar mensajes de conversación activa
      const loadMsgs = async (convId) => {
        try {
          const token = localStorage.getItem('mhToken');
          const r = await fetch(`${API}/api/chat/conversations/${convId}/messages`, { headers: { Authorization:`Bearer ${token}` } });
          if (!r.ok) throw new Error();
          const d = await r.json();
          setMsgs(d.messages);
        } catch {
          setMsgs(MOCK_MSGS[convId] || []);
        }
      };

      useEffect(() => { loadConvs(); }, []);

      useEffect(() => {
        if (!active) return;
        loadMsgs(active.id);
        // Polling cada 4 segundos
        pollRef.current = setInterval(() => loadMsgs(active.id), 4000);
        return () => clearInterval(pollRef.current);
      }, [active]);

      useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

      const send = async () => {
        if (!input.trim() || !active) return;
        const body = input.trim();
        setInput('');
        setSending(true);
        // Optimista: agregar mensaje de inmediato
        const optimistic = { id: 'tmp'+Date.now(), sender_id:'me', sender_name: role==='distributor'?'Diana Distribuciones S.A.':'Tienda El Progreso', sender_role: role, body, created_at: new Date().toISOString() };
        setMsgs(prev => [...prev, optimistic]);
        try {
          const token = localStorage.getItem('mhToken');
          await fetch(`${API}/api/chat/conversations/${active.id}/messages`, {
            method: 'POST',
            headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
            body: JSON.stringify({ body })
          });
          await loadMsgs(active.id);
        } catch { /* keep optimistic */ } finally { setSending(false); }
        // Actualizar last_message en lista
        setConvs(prev => prev.map(c => c.id===active.id ? {...c, last_message:body, last_at:new Date().toISOString()} : c));
      };

      const fmtTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
      };
      const fmtDate = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString('es-MX', { day:'numeric', month:'short' });
      };

      const myId = role === 'distributor' ? 'd1' : 'b1';
      const totalUnread = convs.reduce((a,c) => a + (role==='distributor' ? c.unread_dist : c.unread_buyer), 0);

      return (
        <div className="fade-in flex h-[calc(100vh-2rem)] -m-8 overflow-hidden rounded-2xl border border-slate-200 bg-white">
          {/* ── Lista de conversaciones ── */}
          <div className="w-80 flex-shrink-0 border-r border-slate-100 flex flex-col">
            <div className="px-5 py-4 border-b border-slate-100">
              <div className="flex items-center justify-between mb-1">
                <h2 className="font-bold text-slate-800 text-lg">Mensajes</h2>
                {totalUnread > 0 && (
                  <span className="bg-sky-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">{totalUnread}</span>
                )}
              </div>
              <p className="text-xs text-slate-400">Conversaciones con {role==='distributor'?'compradores':'distribuidores'}</p>
            </div>
            <div className="flex-1 overflow-y-auto">
              {loading ? (
                <div className="p-6 text-center text-slate-400 text-sm">Cargando...</div>
              ) : convs.length === 0 ? (
                <div className="p-6 text-center">
                  <div className="text-4xl mb-3">💬</div>
                  <p className="text-slate-500 text-sm">Sin conversaciones aún</p>
                </div>
              ) : convs.map(c => {
                const unread = role==='distributor' ? c.unread_dist : c.unread_buyer;
                const isActive = active?.id === c.id;
                const otherName = role==='distributor' ? c.buyer_name : (c.company_name || c.dist_name);
                return (
                  <button key={c.id} onClick={() => { setActive(c); setConvs(prev=>prev.map(x=>x.id===c.id?{...x,[role==='distributor'?'unread_dist':'unread_buyer']:0}:x)); }}
                    className={`w-full text-left px-4 py-3.5 border-b border-slate-50 transition-colors ${isActive?'bg-sky-50':'hover:bg-slate-50'}`}>
                    <div className="flex items-start gap-3">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0 font-bold ${isActive?'bg-sky-100':'bg-slate-100'}`}>
                        {otherName?.charAt(0) || '?'}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between mb-0.5">
                          <span className={`text-sm font-semibold truncate ${unread>0?'text-slate-900':'text-slate-700'}`}>{otherName}</span>
                          <span className="text-xs text-slate-400 flex-shrink-0 ml-2">{fmtDate(c.last_at)}</span>
                        </div>
                        {c.product_name && <div className="text-xs text-sky-500 truncate mb-0.5">📦 {c.product_name}</div>}
                        <div className="flex items-center justify-between">
                          <p className={`text-xs truncate ${unread>0?'text-slate-700 font-medium':'text-slate-400'}`}>{c.last_message || 'Sin mensajes aún'}</p>
                          {unread > 0 && <span className="ml-2 w-5 h-5 bg-sky-500 rounded-full text-white text-xs flex items-center justify-center font-bold flex-shrink-0">{unread}</span>}
                        </div>
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* ── Vista de chat ── */}
          {active ? (
            <div className="flex-1 flex flex-col min-w-0">
              {/* Header */}
              <div className="px-6 py-4 border-b border-slate-100 flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-lg font-bold">
                  {(role==='distributor' ? active.buyer_name : (active.company_name || active.dist_name))?.charAt(0)}
                </div>
                <div>
                  <div className="font-semibold text-slate-800">
                    {role==='distributor' ? active.buyer_name : (active.company_name || active.dist_name)}
                  </div>
                  {active.product_name && <div className="text-xs text-sky-500">📦 {active.product_name}</div>}
                </div>
              </div>

              {/* Mensajes */}
              <div className="flex-1 overflow-y-auto px-6 py-4 space-y-3">
                {msgs.map(m => {
                  const isMe = m.sender_role === role;
                  return (
                    <div key={m.id} className={`flex ${isMe?'justify-end':'justify-start'}`}>
                      <div className={`max-w-[68%] ${isMe?'order-1':''}`}>
                        {!isMe && <div className="text-xs text-slate-400 mb-1 ml-1">{m.sender_name}</div>}
                        <div className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${isMe?'bg-sky-500 text-white rounded-br-sm':'bg-slate-100 text-slate-800 rounded-bl-sm'}`}>
                          {m.body}
                        </div>
                        <div className={`text-xs text-slate-400 mt-1 ${isMe?'text-right mr-1':'ml-1'}`}>{fmtTime(m.created_at)}</div>
                      </div>
                    </div>
                  );
                })}
                <div ref={messagesEnd} />
              </div>

              {/* Input */}
              <div className="px-6 py-4 border-t border-slate-100">
                <div className="flex items-center gap-3 bg-slate-50 rounded-2xl px-4 py-2.5 border border-slate-200 focus-within:border-sky-300 transition-colors">
                  <input
                    className="flex-1 bg-transparent text-sm text-slate-800 placeholder-slate-400 outline-none"
                    placeholder="Escribe un mensaje..."
                    value={input}
                    onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } }}
                  />
                  <button onClick={send} disabled={!input.trim() || sending}
                    className="w-9 h-9 rounded-xl bg-sky-500 hover:bg-sky-600 disabled:opacity-40 flex items-center justify-center text-white transition-colors flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
                      <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                    </svg>
                  </button>
                </div>
                <p className="text-xs text-slate-400 mt-2 text-center">Enter para enviar · Los mensajes se actualizan cada 4 segundos</p>
              </div>
            </div>
          ) : (
            <div className="flex-1 flex flex-col items-center justify-center text-center p-8">
              <div className="text-7xl mb-4">💬</div>
              <h3 className="text-xl font-bold text-slate-700 mb-2">Selecciona una conversación</h3>
              <p className="text-slate-400 text-sm max-w-xs">Elige un chat de la lista para ver los mensajes y responder a tus {role==='distributor'?'compradores':'distribuidores'}.</p>
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════
       BUYER PAGES — Estilo Rappi / PedidosYa
    ═══════════════════════════════════════════ */

    /* Datos de tiendas (distribuidores) */
    const STORES = [
      { id:'d1', name:'Diana Distribuciones S.A.', tag:'Snacks · Lácteos · Granos · Aceites', rating:4.8, reviews:142, minOrder:50, delivery:'2-4 hrs', featured:true,
        gradient:'linear-gradient(135deg,#0ea5e9 0%,#6366f1 100%)', emoji:'🏭', badge:'⭐ Destacado', disc:30 },
      { id:'d2', name:'Interamérica Alimentos S.A.', tag:'Granos · Lácteos · Limpieza', rating:4.9, reviews:215, minOrder:80, delivery:'3-5 hrs', featured:false,
        gradient:'linear-gradient(135deg,#10b981 0%,#0891b2 100%)', emoji:'🚛', badge:'🔥 Top ventas', disc:34 },
      { id:'d3', name:'Distribuidora APS S.A.', tag:'Harinas · Embutidos · Café · Condimentos', rating:4.7, reviews:88, minOrder:60, delivery:'2-3 hrs', featured:false,
        gradient:'linear-gradient(135deg,#f59e0b 0%,#ef4444 100%)', emoji:'🏪', badge:'🆕 Nuevo', disc:33 },
    ];

    const CATS = [
      { id:'todas',      label:'Todo',         emoji:'🏠' },
      { id:'Granos',     label:'Granos',       emoji:'🌾' },
      { id:'Aceites',    label:'Aceites',      emoji:'🫙' },
      { id:'Lácteos',    label:'Lácteos',      emoji:'🥛' },
      { id:'Harinas',    label:'Harinas',      emoji:'🌽' },
      { id:'Condimentos',label:'Condimentos',  emoji:'🧂' },
      { id:'Snacks',     label:'Snacks',       emoji:'🍪' },
      { id:'Embutidos',  label:'Embutidos',    emoji:'🥩' },
      { id:'Bebidas',    label:'Bebidas',      emoji:'☕' },
      { id:'Endulzantes',label:'Endulzantes',  emoji:'🍬' },
      { id:'Limpieza',   label:'Limpieza',     emoji:'🧺' },
    ];

    /* ── Tarjeta de producto grande (estilo Rappi) ── */
    const RappiCard = ({ p, inCart, onAdd }) => (
      <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-200 flex flex-col">
        {/* Imagen / cover del producto */}
        <div className="relative h-36 flex items-center justify-center" style={{background:'linear-gradient(135deg,#f8fafc,#e2e8f0)'}}>
          <span className="text-7xl">{p.emoji}</span>
          {/* Badge descuento */}
          <div className="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-lg">
            -{p.disc}%
          </div>
          {p.featured && (
            <div className="absolute top-2 right-2 bg-amber-400 text-amber-900 text-xs font-bold px-2 py-1 rounded-lg">
              ⭐
            </div>
          )}
        </div>
        {/* Info */}
        <div className="p-3 flex-1 flex flex-col">
          <h3 className="font-semibold text-slate-800 text-sm leading-snug mb-0.5">{p.name}</h3>
          <p className="text-xs text-slate-400 mb-2">{p.dist}</p>
          {/* Precios */}
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base font-extrabold text-slate-900">{$$(p.price)}</span>
            <span className="text-xs text-slate-400 line-through">{$$(p.retail)}</span>
            <span className="text-xs text-slate-500">/{p.unit}</span>
          </div>
          {/* Ahorro prominente */}
          <div className="mt-auto">
            <div className="flex items-center gap-1 bg-emerald-50 rounded-lg px-2 py-1.5 mb-2">
              <span className="text-emerald-600 text-xs font-bold">💰 Ahorras {$$(p.retail - p.price)}/{p.unit}</span>
            </div>
            <button onClick={()=>onAdd(p)}
              className={`w-full py-2 rounded-xl text-sm font-bold transition-all duration-150 active:scale-95 ${inCart ? 'bg-emerald-500 text-white' : 'bg-sky-500 text-white hover:bg-sky-600'}`}>
              {inCart ? '✓ En carrito' : '+ Agregar'}
            </button>
          </div>
        </div>
      </div>
    );

    /* ── Vista detalle de una tienda (distribuidor) ── */
    const StoreDetail = ({ store, cart, setCart, onBack }) => {
      const [activeCat, setActiveCat] = useState('todas');
      const products = PRODUCTS.filter(p => p.distId === store.id);
      const storeCats = ['todas', ...new Set(products.map(p => p.cat))];
      const filtered = activeCat === 'todas' ? products : products.filter(p => p.cat === activeCat);

      const addToCart = (p) => setCart(prev => {
        const ex = prev.find(i => i.id === p.id);
        return ex ? prev.map(i => i.id === p.id ? {...i, qty: i.qty + p.minOrder} : i) : [...prev, {...p, qty: p.minOrder}];
      });

      return (
        <div className="fade-in">
          {/* Cover de la tienda */}
          <div className="rounded-2xl overflow-hidden mb-5 relative h-44 flex items-end" style={{background: store.gradient}}>
            <div className="absolute inset-0 flex items-center justify-center">
              <span className="text-8xl opacity-30">{store.emoji}</span>
            </div>
            <div className="relative z-10 p-5 w-full" style={{background:'linear-gradient(to top, rgba(0,0,0,0.55), transparent)'}}>
              <button onClick={onBack} className="text-white/80 text-sm mb-2 hover:text-white flex items-center gap-1">← Volver al catálogo</button>
              <h2 className="text-2xl font-extrabold text-white">{store.name}</h2>
              <p className="text-white/80 text-sm">{store.tag}</p>
            </div>
            <div className="absolute top-4 right-4 bg-white/20 backdrop-blur-sm text-white text-xs font-bold px-3 py-1.5 rounded-full border border-white/30">
              {store.badge}
            </div>
          </div>

          {/* Info rápida */}
          <div className="flex items-center gap-4 mb-5 p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
            <div className="text-center flex-1 border-r border-slate-100">
              <div className="text-lg font-bold text-slate-800">⭐ {store.rating}</div>
              <div className="text-xs text-slate-400">{store.reviews} reseñas</div>
            </div>
            <div className="text-center flex-1 border-r border-slate-100">
              <div className="text-lg font-bold text-slate-800">🕐 {store.delivery}</div>
              <div className="text-xs text-slate-400">Tiempo entrega</div>
            </div>
            <div className="text-center flex-1 border-r border-slate-100">
              <div className="text-lg font-bold text-slate-800">📦 {filtered.length}</div>
              <div className="text-xs text-slate-400">Productos</div>
            </div>
            <div className="text-center flex-1">
              <div className="text-lg font-bold text-emerald-600">Hasta -{store.disc}%</div>
              <div className="text-xs text-slate-400">vs precio mercado</div>
            </div>
          </div>

          {/* Filtro de categorías */}
          <div className="flex gap-2 mb-5 overflow-x-auto pb-1" style={{scrollbarWidth:'none'}}>
            {storeCats.map(c => (
              <button key={c} onClick={() => setActiveCat(c)}
                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeCat === c ? 'bg-sky-500 text-white shadow-sm' : 'bg-white text-slate-600 border border-slate-200 hover:border-sky-300'}`}>
                {c === 'todas' ? '🏠 Todo' : c}
              </button>
            ))}
          </div>

          {/* Grid de productos */}
          <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            {filtered.map(p => (
              <RappiCard key={p.id} p={p} inCart={cart.some(i => i.id === p.id)} onAdd={addToCart} />
            ))}
          </div>
        </div>
      );
    };

    /* ── Catálogo principal con Búsqueda y Filtros Avanzados ── */
    const Catalog = ({ cart, setCart }) => {
      const [search, setSearch]       = useState('');
      const [activeCat, setActiveCat] = useState('todas');
      const [activeStore, setActiveStore] = useState(null);
      const [showFilters, setShowFilters] = useState(false);
      const [sortBy, setSortBy]       = useState('featured'); // featured | price_asc | price_desc | disc | rating
      const [filterDist, setFilterDist] = useState('todas');  // todas | d1 | d2 | d3
      const [minDisc, setMinDisc]     = useState(0);          // 0 | 20 | 30 | 40
      const [priceMax, setPriceMax]   = useState(999);        // slider max price

      if (activeStore) {
        return <StoreDetail store={activeStore} cart={cart} setCart={setCart} onBack={() => setActiveStore(null)} />;
      }

      const addToCart = (p) => setCart(prev => {
        const ex = prev.find(i => i.id === p.id);
        return ex ? prev.map(i => i.id === p.id ? {...i, qty: i.qty + p.minOrder} : i) : [...prev, {...p, qty: p.minOrder}];
      });

      const isFiltering = search.length > 0 || activeCat !== 'todas' || filterDist !== 'todas' || minDisc > 0 || priceMax < 999 || sortBy !== 'featured';
      const activeFiltersCount = (activeCat !== 'todas' ? 1 : 0) + (filterDist !== 'todas' ? 1 : 0) + (minDisc > 0 ? 1 : 0) + (priceMax < 999 ? 1 : 0);

      /* Filtrado y ordenamiento combinado */
      const filteredProducts = useMemo(() => {
        let list = PRODUCTS.filter(p => {
          const matchSearch = search.length < 2 || p.name.toLowerCase().includes(search.toLowerCase()) || p.dist.toLowerCase().includes(search.toLowerCase()) || p.cat.toLowerCase().includes(search.toLowerCase());
          const matchCat    = activeCat === 'todas' || p.cat === activeCat;
          const matchDist   = filterDist === 'todas' || p.distId === filterDist;
          const matchDisc   = p.disc >= minDisc;
          const matchPrice  = p.price <= priceMax;
          return matchSearch && matchCat && matchDist && matchDisc && matchPrice;
        });
        switch(sortBy) {
          case 'price_asc':  return list.sort((a,b) => a.price - b.price);
          case 'price_desc': return list.sort((a,b) => b.price - a.price);
          case 'disc':       return list.sort((a,b) => b.disc - a.disc);
          case 'rating':     return list.sort((a,b) => b.rating - a.rating);
          default:           return list.sort((a,b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
        }
      }, [search, activeCat, filterDist, minDisc, priceMax, sortBy]);

      const resetFilters = () => { setActiveCat('todas'); setFilterDist('todas'); setMinDisc(0); setPriceMax(999); setSortBy('featured'); setSearch(''); };

      /* Variables para la vista sin filtros activos */
      const catProducts = activeCat === 'todas'
        ? PRODUCTS.filter(p => p.featured)
        : PRODUCTS.filter(p => p.cat === activeCat);
      const deals = [...PRODUCTS].sort((a,b) => b.disc - a.disc).slice(0, 6);

      return (
        <div className="fade-in -m-8">
          {/* ── Barra de búsqueda sticky con filtros ── */}
          <div className="sticky top-0 z-30 bg-white border-b border-slate-100 px-6 py-3 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="relative flex-1">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">🔍</span>
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Buscar productos, distribuidores o categorías..."
                  className="w-full bg-slate-100 rounded-xl pl-9 pr-4 py-2.5 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:bg-white transition" />
                {search && <button onClick={() => setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 text-lg">✕</button>}
              </div>
              {/* Botón filtros */}
              <button onClick={() => setShowFilters(f => !f)}
                className={`relative flex items-center gap-2 px-4 py-2.5 rounded-xl border text-sm font-semibold transition-all ${showFilters ? 'bg-sky-500 text-white border-sky-500' : 'bg-white border-slate-200 text-slate-700 hover:border-sky-400'}`}>
                <span>⚙️</span> Filtros
                {activeFiltersCount > 0 && (
                  <span className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold">{activeFiltersCount}</span>
                )}
              </button>
              {/* Selector de orden */}
              <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                className="border border-slate-200 rounded-xl px-3 py-2.5 text-sm text-slate-700 bg-white focus:outline-none focus:ring-2 focus:ring-sky-400 cursor-pointer">
                <option value="featured">⭐ Destacados</option>
                <option value="disc">🔥 Mayor descuento</option>
                <option value="rating">⭐ Mejor rating</option>
                <option value="price_asc">💲 Precio: menor a mayor</option>
                <option value="price_desc">💲 Precio: mayor a menor</option>
              </select>
            </div>

            {/* ── Panel de filtros desplegable ── */}
            {showFilters && (
              <div className="mt-3 p-4 bg-slate-50 rounded-2xl border border-slate-200 flex flex-wrap gap-6 items-start fade-in">
                {/* Filtro distribuidor */}
                <div>
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Distribuidor</div>
                  <div className="flex gap-2 flex-wrap">
                    {[{id:'todas',label:'Todos'},{id:'d1',label:'Diana Dist.'},{id:'d2',label:'Interamérica'},{id:'d3',label:'APS'}].map(d=>(
                      <button key={d.id} onClick={()=>setFilterDist(d.id)}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all ${filterDist===d.id?'bg-sky-500 text-white border-sky-500':'bg-white text-slate-600 border-slate-200 hover:border-sky-400'}`}>
                        {d.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Filtro descuento mínimo */}
                <div>
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Descuento mínimo</div>
                  <div className="flex gap-2">
                    {[0, 20, 25, 30].map(d => (
                      <button key={d} onClick={() => setMinDisc(d)}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all ${minDisc===d?'bg-sky-500 text-white border-sky-500':'bg-white text-slate-600 border-slate-200 hover:border-sky-400'}`}>
                        {d === 0 ? 'Todos' : `${d}%+`}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Filtro precio máximo */}
                <div>
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">
                    Precio máx: <span className="text-sky-600">{priceMax < 999 ? `$${priceMax}` : 'Sin límite'}</span>
                  </div>
                  <input type="range" min="1" max="999" step="1" value={priceMax}
                    onChange={e => setPriceMax(Number(e.target.value))}
                    className="w-40 accent-sky-500" />
                </div>

                {/* Botón limpiar */}
                {(activeFiltersCount > 0) && (
                  <div className="flex items-end">
                    <button onClick={resetFilters}
                      className="px-4 py-1.5 rounded-lg text-xs font-semibold border border-red-200 text-red-500 hover:bg-red-50 transition-all">
                      ✕ Limpiar filtros
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="px-6 py-5">

            {/* ── RESULTADOS FILTRADOS (cuando hay búsqueda o filtros activos) ── */}
            {isFiltering ? (
              <div>
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-lg font-bold text-slate-800">
                    {filteredProducts.length > 0 ? `${filteredProducts.length} producto${filteredProducts.length!==1?'s':''} encontrado${filteredProducts.length!==1?'s':''}` : 'Sin resultados'}
                    {search.length > 1 && <span className="font-normal text-slate-400"> para "{search}"</span>}
                  </h2>
                  <button onClick={resetFilters} className="text-xs text-sky-500 hover:text-sky-700 font-medium">Ver todo</button>
                </div>
                {filteredProducts.length > 0 ? (
                  <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    {filteredProducts.map(p => (
                      <RappiCard key={p.id} p={p} inCart={cart.some(i => i.id === p.id)} onAdd={addToCart} />
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-24">
                    <div className="text-6xl mb-4">🔍</div>
                    <p className="text-slate-700 font-semibold mb-1">No encontramos productos</p>
                    <p className="text-slate-400 text-sm mb-6">Intenta con otros filtros o términos de búsqueda</p>
                    <Btn v="outline" onClick={resetFilters}>Limpiar filtros</Btn>
                  </div>
                )}
              </div>
            ) : (
              <>
                {/* ── HERO BANNER ── */}
                <div className="rounded-2xl overflow-hidden mb-6 relative" style={{height:200, background:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0284c7 100%)'}}>
                  <div className="absolute right-8 top-1/2 -translate-y-1/2 text-9xl opacity-20 select-none">🫘</div>
                  <div className="absolute inset-0 flex flex-col justify-center px-8">
                    <div className="inline-flex items-center gap-2 bg-white/10 text-sky-300 text-xs font-semibold px-3 py-1 rounded-full mb-3 w-fit border border-white/20">
                      ⚡ Oferta de la semana
                    </div>
                    <h2 className="text-2xl font-extrabold text-white mb-1">Hasta 40% OFF</h2>
                    <p className="text-sky-200 text-sm mb-4">en frijoles rojos de seda y granos básicos</p>
                    <button onClick={() => { setActiveCat('Granos'); setShowFilters(false); }}
                      className="bg-sky-500 hover:bg-sky-400 text-white font-bold text-sm px-5 py-2.5 rounded-xl w-fit transition active:scale-95">
                      Ver oferta →
                    </button>
                  </div>
                </div>

                {/* ── CATEGORÍAS HORIZONTALES ── */}
                <div className="mb-6">

                    <Badge label="Activo" cls="bg-emerald-100 text-emerald-700" />
                  </div>
                  <div className="font-bold text-slate-800 mb-1">{s.dist} · {s.prod}</div>
                  <div className="flex gap-5 text-sm text-slate-500">
                    <span>👁️ {s.imp.toLocaleString()} impresiones</span>
                    <span>🖱️ {s.clicks} clics ({((s.clicks/s.imp)*100).toFixed(1)}% CTR)</span>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-xl font-bold text-sky-600">{$$(s.price)}</div>
                  <div className="text-xs text-slate-400">price/mo</div>
                </div>
              </div>
            </Card>
          ))}
        </div>
      </div>
    );

    /* ═══════════════════════════════════════════
       APP ROOT
    ═══════════════════════════════════════════ */
    const App = () => {
      const [view, setView] = useState('landing');
      const [role, setRole] = useState(null);
      const [page, setPage] = useState('');
      const [cart, setCart] = useState([]);

      const USERS = {
        distributor:{ name:'Diana Distribuciones S.A.', email:'ventas@diana.com.sv' },
        buyer:      { name:'Tienda El Progreso', email:'progreso@correo.com.sv' },
        admin:      { name:'Admin MarketHub', email:'admin@markethub.sv' },
      };

      const login = (r) => {
        setRole(r);
        setPage(r==='distributor'?'dash':r==='admin'?'aoverview':'catalog');
        setView('app');
      };
      const logout = () => { setView('landing'); setRole(null); setCart([]); };

      if(view==='landing') return <Landing go={login} />;

      const renderPage = () => {
        if(role==='distributor') switch(page){
          case 'dash':      return <DistDash setPage={setPage} />;
          case 'products':  return <DistProducts />;
          case 'inventory': return <Inventory />;
          case 'orders':    return <DistOrders />;
          case 'promos':    return <Promos />;
          case 'chat':      return <ChatPage role="distributor" />;
          case 'analytics': return <Analytics />;
          case 'plans':     return <Plans />;
          default:          return <DistDash setPage={setPage} />;
        }
        if(role==='buyer') switch(page){
          case 'catalog':   return <Catalog cart={cart} setCart={setCart} />;
          case 'cart':      return <CartPage cart={cart} setCart={setCart} setPage={setPage} />;
          case 'myorders':  return <MyOrders />;
          case 'savings':   return <Savings />;
          case 'chat':      return <ChatPage role="buyer" />;
          default:          return <Catalog cart={cart} setCart={setCart} />;
        }
        if(role==='admin') switch(page){
          case 'aoverview': return <AdminOverview />;
          case 'acomm':     return <AdminComm />;
          case 'ausers':    return <AdminUsers />;
          case 'afeat':     return <AdminFeat />;
          default:          return <AdminOverview />;
        }
      };

      return (
        <div className="flex min-h-screen bg-slate-50">
          <Sidebar role={role} page={page} setPage={setPage} user={USERS[role]} onLogout={logout} cartCount={cart.length} />
          <main className={`flex-1 overflow-y-auto min-w-0 ${role==='buyer' ? '' : 'p-8'}`}>{renderPage()}</main>

          {/* DEMO SWITCHER */}
          <div className="fixed bottom-5 right-5 flex flex-col gap-2 items-end z-50">
            <div className="text-xs text-slate-400 text-right">Vista demo:</div>
            {[{r:'distributor',l:'🏭 Distribuidor'},{r:'buyer',l:'🛒 Comprador'},{r:'admin',l:'⚙️ Admin'}].map(x=>(
              <Btn key={x.r} v={role===x.r?'primary':'outline'} sz="sm" onClick={()=>login(x.r)}
                cls="shadow-lg">{x.l}</Btn>
            ))}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
